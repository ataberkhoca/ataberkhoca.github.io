<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthy Food Festival | Food & Drinks | Ataberk Hoca İngilizce</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --rose:       #E84393;
  --rose-light: #FDEEF6;
  --lime:       #5BBF2A;
  --lime-light: #EDFAE4;
  --amber:      #F59E0B;
  --amber-lt:   #FEF3C7;
  --purple:     #7C3AED;
  --purple-lt:  #EDE9FE;
  --sky:        #0EA5E9;
  --sky-lt:     #E0F2FE;
  --navy:       #1B2845;
  --navy2:      #2D3A55;
  --cream:      #FFFBF0;
  --white:      #FFFFFF;
  --gray-100:   #F4F4F0;
  --gray-200:   #E2E0DA;
  --gray-500:   #86857E;
  --green:      #22C55E;
  --green-lt:   #DCFCE7;
  --red:        #EF4444;
  --red-lt:     #FEE2E2;
  --shadow:     0 4px 20px rgba(27,40,69,.09);
  --shadow-lg:  0 8px 32px rgba(27,40,69,.15);
  --r:          14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--navy);min-height:100vh;overflow-x:hidden;}
h1,h2,h3,.brand{font-family:'Baloo 2',cursive;}

/* NAVBAR */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:100;height:66px;padding:0 32px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,251,240,.94);backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(232,67,147,.1);
}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo{
  width:40px;height:40px;border-radius:11px;
  background:linear-gradient(135deg,var(--rose),var(--amber));
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  box-shadow:0 3px 10px rgba(232,67,147,.28);
}
.brand{font-size:1.2rem;font-weight:800;color:var(--navy);}
.nav-back{
  display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--navy2);
  font-weight:700;font-size:.9rem;background:var(--white);
  border:1.5px solid var(--gray-200);padding:.4rem .9rem;border-radius:99px;transition:all .2s;
}
.nav-back:hover{background:var(--rose);color:#fff;border-color:var(--rose);}

/* HERO */
.hero{
  margin-top:66px;
  background:linear-gradient(135deg,#9B1B6A 0%,#E84393 45%,#F59E0B 100%);
  padding:2.2rem 32px 2rem;position:relative;overflow:hidden;
}
.hero::before{
  content:'🎪';
  position:absolute;font-size:18rem;opacity:.05;
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}
.confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.confetti span{
  position:absolute;font-size:1.4rem;
  animation:fall linear infinite;
  opacity:.18;
}
@keyframes fall{from{transform:translateY(-40px) rotate(0deg);}to{transform:translateY(140px) rotate(360deg);}}
.hero-inner{position:relative;z-index:1;max-width:720px;margin:0 auto;text-align:center;}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.2);color:#fff;
  font-size:.78rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  padding:.3rem .85rem;border-radius:99px;margin-bottom:.8rem;
  border:1px solid rgba(255,255,255,.28);
}
.hero h1{font-size:clamp(1.7rem,4vw,2.5rem);font-weight:800;color:#fff;line-height:1.15;margin-bottom:.5rem;text-shadow:0 2px 12px rgba(0,0,0,.2);}
.hero p{color:rgba(255,255,255,.88);font-size:1rem;font-weight:600;}

/* DIFFICULTY BAR */
.diff-bar{
  background:var(--white);border-bottom:1px solid var(--gray-200);
  padding:.9rem 32px;display:flex;align-items:center;justify-content:center;gap:.6rem;flex-wrap:wrap;
}
.diff-btn{
  padding:.45rem 1.1rem;border-radius:99px;font-size:.85rem;font-weight:700;
  border:2px solid var(--gray-200);background:var(--gray-100);color:var(--navy2);
  cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;
}
.diff-btn:hover{border-color:var(--rose);color:var(--rose);}
.diff-btn.active-sup{background:var(--lime-light);border-color:var(--lime);color:var(--lime);}
.diff-btn.active-std{background:var(--sky-lt);border-color:var(--sky);color:var(--sky);}
.diff-btn.active-exp{background:var(--purple-lt);border-color:var(--purple);color:var(--purple);}

/* MAIN */
.main{max-width:760px;margin:0 auto;padding:1.8rem 20px 4rem;}

/* PROGRESS */
.progress-row{
  display:flex;align-items:center;gap:1rem;
  background:var(--white);border-radius:var(--r);padding:.7rem 1.2rem;
  margin-bottom:1.4rem;box-shadow:var(--shadow);font-weight:700;font-size:.9rem;
}
.q-counter{font-family:'Baloo 2',cursive;color:var(--rose);font-size:1rem;white-space:nowrap;}
.progress-wrap{height:7px;background:var(--gray-200);border-radius:99px;overflow:hidden;flex:1;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--amber));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.score-badge{font-family:'Baloo 2',cursive;color:var(--amber);font-size:1rem;white-space:nowrap;}

/* HINT */
.hint-box{
  background:var(--amber-lt);border:1.5px dashed var(--amber);border-radius:var(--r);
  padding:.75rem 1.1rem;margin-bottom:1.2rem;
  display:none;align-items:center;gap:.7rem;
  font-size:.88rem;font-weight:700;color:#78450A;
}
.hint-box.visible{display:flex;}

/* FESTIVAL STAND */
.stand-card{
  background:var(--white);border-radius:20px;
  box-shadow:var(--shadow-lg);overflow:hidden;
  margin-bottom:1.2rem;
  border:2.5px solid transparent;
  transition:border-color .3s;
}
/* stand-card border states now handled in scene block above */

/* Stand visual scene */
.stand-scene{
  padding:1.2rem 1.5rem 1rem;
  position:relative;overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;gap:1.5rem;
  min-height:130px;
}
/* Colourful striped awning background */
.stand-scene::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:36px;
  background:repeating-linear-gradient(90deg,var(--scene-a) 0px,var(--scene-a) 24px,var(--scene-b) 24px,var(--scene-b) 48px);
  transition:background 0.6s ease;
  transform-origin:top center;
  animation:awningOpen 0.4s cubic-bezier(0.22,0.61,0.36,1) both;
}
@keyframes awningOpen{
  from{height:0;opacity:0;}
  to{height:36px;opacity:1;}
}

/* Vendor enter from behind stand */
@keyframes vendorEnter{
  from{opacity:0;transform:translateY(20px) scale(0.85);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.vendor-avatar{
  font-size:2.6rem;line-height:1;
  display:inline-block;
  animation:vendorEnter 0.45s cubic-bezier(0.22,0.61,0.36,1) both;
}
/* Vendor joy jump on correct */
@keyframes vendorJoy{
  0%,100%{transform:translateY(0);}
  30%{transform:translateY(-12px) rotate(-8deg);}
  60%{transform:translateY(-6px) rotate(6deg);}
}
.vendor-avatar.joy{animation:vendorJoy 0.55s ease;}
/* Vendor shake on wrong */
@keyframes vendorShake{
  0%,100%{transform:rotate(0deg);}
  20%{transform:rotate(-8deg);}
  40%{transform:rotate(8deg);}
  60%{transform:rotate(-5deg);}
  80%{transform:rotate(5deg);}
}
.vendor-avatar.shake{animation:vendorShake 0.45s ease;}

/* Stand items stagger */
@keyframes itemReveal{
  from{transform:scale(0) rotate(-10deg);opacity:0;}
  60%{transform:scale(1.2) rotate(4deg);}
  100%{transform:scale(1) rotate(0deg);opacity:1;}
}
.stand-item.reveal{
  animation:itemReveal 0.35s cubic-bezier(0.22,0.61,0.36,1) both;
}

/* Stand card correct glow */
@keyframes cardGlow{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,0.6);}
  40%{box-shadow:0 0 0 12px rgba(34,197,94,0.25);}
  100%{box-shadow:0 0 0 16px rgba(34,197,94,0);}
}
.stand-card.correct-flash{
  border-color:var(--green);
  animation:cardGlow 0.6s ease forwards;
}
/* Wrong: just border (existing behaviour), no glow needed */
.stand-card.wrong-flash{border-color:var(--red);}

/* Each stand has its own stripe colours set via inline style */
.stand-vendor{
  display:flex;flex-direction:column;align-items:center;gap:.3rem;
  position:relative;z-index:1;
}
.vendor-avatar{font-size:2.6rem;line-height:1;}
.vendor-name{font-family:'Baloo 2',cursive;font-size:.72rem;font-weight:800;color:var(--navy2);}

.stand-items{
  display:flex;gap:.5rem;align-items:flex-end;position:relative;z-index:1;
  flex-wrap:wrap;justify-content:center;
}
.stand-item{
  display:flex;flex-direction:column;align-items:center;gap:.15rem;
  background:rgba(255,255,255,.85);border-radius:10px;padding:.4rem .55rem;
  box-shadow:0 2px 8px rgba(27,40,69,.08);border:1.5px solid rgba(27,40,69,.06);
}
.si-emoji{font-size:1.5rem;line-height:1;}
.si-label{font-size:.65rem;font-weight:800;color:var(--navy2);font-family:'Baloo 2',cursive;}

/* Dialogue area */
.dialogue-area{padding:1.2rem 1.5rem;}

.bubble-row{display:flex;align-items:flex-end;gap:.7rem;margin-bottom:.8rem;}
.bubble-row.vendor-side{flex-direction:row;}
.bubble-row.user-side  {flex-direction:row-reverse;}

.bubble-avatar{font-size:1.9rem;flex-shrink:0;}
.bubble{
  max-width:78%;padding:.7rem 1rem;border-radius:18px;
  font-family:'Baloo 2',cursive;font-weight:700;font-size:.98rem;color:var(--navy);
  line-height:1.45;
}
.vendor-side .bubble{background:#F3F4FF;border-bottom-left-radius:4px;border:1.5px solid #DDE0F8;}
.user-side   .bubble{background:var(--rose-light);border-bottom-right-radius:4px;border:1.5px solid #F5C6DF;color:var(--rose);}
.bubble.placeholder{color:var(--gray-500);border-style:dashed;}

/* Options */
.options{display:flex;flex-direction:column;gap:.5rem;margin-top:.4rem;}
.option-btn{
  width:100%;padding:.72rem 1.1rem;
  border-radius:12px;font-size:.93rem;font-weight:700;
  font-family:'Nunito',sans-serif;
  border:2px solid var(--gray-200);background:var(--gray-100);
  color:var(--navy);cursor:pointer;text-align:left;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  display:flex;align-items:center;gap:.6rem;
}
.option-btn:hover:not(:disabled){border-color:var(--rose);background:var(--rose-light);transform:translateX(4px);}
.option-btn.correct{border-color:var(--green);background:var(--green-lt);color:#166534;}
.option-btn.wrong  {border-color:var(--red);  background:var(--red-lt);  color:#991B1B;}
.option-btn:disabled{cursor:default;}
.opt-letter{
  width:24px;height:24px;border-radius:50%;
  background:var(--gray-200);color:var(--navy2);
  font-size:.75rem;font-weight:800;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Baloo 2',cursive;
}
@keyframes optIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Feedback */
.feedback{
  margin-top:.8rem;padding:.65rem 1rem;border-radius:10px;
  font-size:.88rem;font-weight:700;display:none;align-items:center;gap:.5rem;
}
.feedback.visible{display:flex;}
.feedback.ok{background:var(--green-lt);color:#166534;}
.feedback.no{background:var(--red-lt);  color:#991B1B;}

/* Next btn */
.next-btn{
  display:none;width:100%;margin-top:.9rem;
  padding:.78rem;border-radius:12px;font-size:1rem;font-weight:800;
  font-family:'Baloo 2',cursive;
  background:linear-gradient(135deg,var(--rose),var(--amber));
  color:#fff;border:none;cursor:pointer;
  box-shadow:0 4px 16px rgba(232,67,147,.28);
  transition:transform .2s,box-shadow .2s;
}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(232,67,147,.4);}
.next-btn.visible{display:block;}

/* STAND SELECTOR (between questions) */
.stand-map{
  display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;
  margin-bottom:1.2rem;
}
.stand-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--gray-200);transition:all .3s;
}
.stand-dot.done   {background:var(--green);}
.stand-dot.current{background:var(--rose);transform:scale(1.4);}

/* WIN */
.win-screen{
  display:none;text-align:center;background:var(--white);border-radius:20px;
  padding:2.5rem 2rem;box-shadow:var(--shadow-lg);border:2px solid var(--rose);
}
.win-screen.visible{display:block;}
.win-emoji{font-size:4rem;margin-bottom:.8rem;animation:pop .5s cubic-bezier(.4,0,.2,1);}
@keyframes pop{0%{transform:scale(.4);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
.win-screen h2{font-size:2rem;font-weight:800;color:var(--rose);margin-bottom:.4rem;}
.win-score{font-size:1.3rem;font-weight:800;color:var(--amber);margin-bottom:.4rem;}
.win-screen p{color:var(--navy2);font-size:.95rem;font-weight:600;margin-bottom:1.5rem;}
.btn-restart{
  display:inline-flex;align-items:center;gap:.5rem;
  background:linear-gradient(135deg,var(--rose),var(--amber));
  color:#fff;font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:700;
  padding:.7rem 2rem;border-radius:99px;cursor:pointer;border:none;
  box-shadow:0 4px 16px rgba(232,67,147,.35);transition:transform .2s;
}
.btn-restart:hover{transform:translateY(-2px);}

footer{text-align:center;padding:1.5rem;font-size:.8rem;color:var(--gray-500);font-weight:600;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--cream);}
::-webkit-scrollbar-thumb{background:var(--rose);border-radius:99px;}
</style>
</head>
<body>

<!-- confetti -->
<div class="confetti" aria-hidden="true">

<nav class="navbar" id="navbar">

<section class="hero">
  <div class="hero-inner">
    <div class="hero-badge">🎪 Theme 6 · Food &amp; Drinks</div>
    <h1>Healthy Food Festival 🎉</h1>
    <p>Festival standlarını gez ve doğru cevabı seç!</p>
  </div>
</section>

<div class="diff-bar">
  <button class="diff-btn" id="btn-sup" onclick="setDiff('supporting')">🟢 Supporting</button>
  <button class="diff-btn" id="btn-std" onclick="setDiff('standard')">🔵 Standard</button>

</div>

<main class="main">

  <div class="progress-row">

  <div class="stand-map" id="stand-map"></div>

  <div id="game-wrap" style="display:none;">

          <div class="vendor-avatar" id="vendor-avatar"></div>

      <div class="dialogue-area">

          <div class="bubble-avatar">🧒</div>

        <div class="feedback" id="feedback"></div>

      </div>
    </div>
  </div>

  <div class="win-screen" id="win-screen">
    <div class="win-emoji">🏆</div>
    <h2>Festival Bitti!</h2>
    <div class="win-score" id="win-score"></div>
    <p id="win-msg"></p>
    <button class="btn-restart" onclick="restart()">🔄 Tekrar Gez</button>
  </div>

</main>

<footer>© Ataberk Hoca İngilizce · TYMM 2025 · MEB Maarif Modeli</footer>

// ══════════════ DIFFICULTY ══════════════
const DIFF = {
  supporting: { optCount:2, showHint:true,  standsCount:3 },
  standard:   { optCount:3, showHint:true,  standsCount:4 },
  expansion:  { optCount:4, showHint:false, standsCount:5 },
};

// ══════════════ STATE ══════════════
let currentDiff = null;
let queue       = [];   // [{stand, variation}]
let qIndex      = 0;
let score       = 0;
let answered    = false;

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function setDiff(diff) {
  currentDiff = diff;
  ['sup','std','exp'].forEach(k => document.getElementById('btn-'+k).className='diff-btn');
  const map={supporting:'sup',standard:'std',expansion:'exp'};
  const cls={supporting:'active-sup',standard:'active-std',expansion:'active-exp'};
  document.getElementById('btn-'+map[diff]).className='diff-btn '+cls[diff];
  buildGame();
}

function buildGame() {
  const cfg   = DIFF[currentDiff];
  // Pick stands
  const stands = shuffle(STANDS).slice(0, cfg.standsCount);
  // For each stand pick one random variation
  queue = stands.map(stand => ({
    stand,
    variation: stand.variations[Math.floor(Math.random() * stand.variations.length)],
  }));
  qIndex   = 0;
  score    = 0;

  document.getElementById('q-total').textContent  = queue.length;
  document.getElementById('score').textContent     = 0;
  document.getElementById('prog').style.width      = '0%';
  document.getElementById('game-wrap').style.display = 'block';
  document.getElementById('win-screen').classList.remove('visible');

  // Stand dots
  buildDots();

  // Hint
  const hintBox = document.getElementById('hint-box');
  if (cfg.showHint) hintBox.classList.add('visible');
  else hintBox.classList.remove('visible');

  renderQuestion();
}

function buildDots() {
  const map = document.getElementById('stand-map');
  map.innerHTML = '';
  queue.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'stand-dot' + (i===0?' current':'');
    d.id = 'dot-'+i;
    map.appendChild(d);
  });
}

function updateDots() {
  queue.forEach((_, i) => {
    const d = document.getElementById('dot-'+i);
    if (!d) return;
    d.className = 'stand-dot' + (i<qIndex?' done':i===qIndex?' current':'');
  });
}

// ══════════════ RENDER ══════════════
// Active typewriter timer
let twTimer = null;

function renderQuestion() {
  answered = false;
  const cfg  = DIFF[currentDiff];
  const {stand, variation} = queue[qIndex];

  document.getElementById('q-num').textContent   = qIndex + 1;
  document.getElementById('prog').style.width    = (qIndex / queue.length * 100) + '%';
  updateDots();

  // Scene colours — trigger awning re-open by restarting the ::before animation
  const scene = document.getElementById('stand-scene');
  scene.style.setProperty('--scene-a', stand.sceneA);
  scene.style.setProperty('--scene-b', stand.sceneB);
  scene.style.background = `linear-gradient(180deg, ${stand.sceneA}18 0%, ${stand.sceneB}12 100%)`;
  // Restart awning animation
  scene.classList.remove('awning-reset');
  scene.offsetWidth;
  scene.classList.add('awning-reset');

  // Vendor — enter animation
  const vendorAvatar = document.getElementById('vendor-avatar');
  vendorAvatar.textContent = stand.vendorEmoji;
  vendorAvatar.classList.remove('joy','shake');
  vendorAvatar.style.animation = 'none';
  vendorAvatar.offsetWidth;
  vendorAvatar.style.animation = '';
  document.getElementById('vendor-name').textContent   = stand.vendorName;
  document.getElementById('v-avatar2').textContent     = stand.vendorEmoji;

  // Stand items — stagger reveal
  const itemsEl = document.getElementById('stand-items');
  itemsEl.innerHTML = stand.items.map((i, idx) =>
    `<div class="stand-item reveal" style="animation-delay:${idx*100}ms">
      <div class="si-emoji">${i.e}</div>
      <div class="si-label">${i.l}</div>
    </div>`
  ).join('');

  // Vendor says — typewriter (starts after vendor enters, 450ms)
  if (twTimer) { clearInterval(twTimer); twTimer = null; }
  const vendorSaysEl = document.getElementById('vendor-says');
  vendorSaysEl.textContent = '';
  const fullText = variation.vendorSays;
  let idx = 0;
  setTimeout(() => {
    twTimer = setInterval(() => {
      if (idx >= fullText.length) { clearInterval(twTimer); twTimer = null; return; }
      vendorSaysEl.textContent += fullText[idx];
      idx++;
    }, 30);
  }, 480);

  // User placeholder
  document.getElementById('user-placeholder').textContent = '???';
  document.getElementById('user-placeholder').style.color = '';

  // Hint
  if (cfg.showHint) {
    document.getElementById('hint-text').textContent = variation.hint;
  }

  // Options — shown after typewriter (estimate: 500ms + text length*30ms)
  const optDelay = 500 + fullText.length * 30 + 100;
  const wrongPool = [variation.wrong2, variation.wrong3, variation.wrong4].slice(0, cfg.optCount - 1);
  const opts      = shuffle([variation.answer, ...wrongPool]);
  const letters   = ['A','B','C','D'];

  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  setTimeout(() => {
    opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.style.opacity = '0';
      btn.style.animation = `optIn 0.3s ease ${i*80}ms forwards`;
      btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
      btn.addEventListener('click', () => pickAnswer(opt === variation.answer, btn, variation));
      optEl.appendChild(btn);
    });
  }, optDelay);

  // Reset
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
  document.getElementById('next-btn').classList.remove('visible');
  document.getElementById('stand-card').className = 'stand-card';
}

// ══════════════ ANSWER ══════════════
function pickAnswer(isCorrect, clickedBtn, variation) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim().slice(1).trim() === variation.answer) b.classList.add('correct');
  });

  const fb   = document.getElementById('feedback');
  const card = document.getElementById('stand-card');

  // Show user reply in bubble
  const placeholder = document.getElementById('user-placeholder');
  placeholder.textContent = variation.answer;
  placeholder.style.color = isCorrect ? '#166534' : '#991B1B';

  if (isCorrect) {
    clickedBtn.classList.add('correct');
    score++;
    document.getElementById('score').textContent = score;
    fb.className = 'feedback visible ok';
    fb.innerHTML = '✅ Harika! Doğru cevap!';
    card.classList.add('correct-flash');
    // Vendor joy jump
    const va = document.getElementById('vendor-avatar');
    va.classList.remove('joy','shake');
    va.offsetWidth;
    va.classList.add('joy');
    setTimeout(() => va.classList.remove('joy'), 600);
  } else {
    clickedBtn.classList.add('wrong');
    fb.className = 'feedback visible no';
    fb.innerHTML = `❌ Tekrar dene! Doğrusu: <strong>${variation.answer}</strong>`;
    card.classList.add('wrong-flash');
    // Vendor head shake
    const va = document.getElementById('vendor-avatar');
    va.classList.remove('joy','shake');
    va.offsetWidth;
    va.classList.add('shake');
    setTimeout(() => va.classList.remove('shake'), 500);
  }

  document.getElementById('next-btn').classList.add('visible');
}

// ══════════════ NEXT ══════════════
function nextQuestion() {
  if (twTimer) { clearInterval(twTimer); twTimer = null; }
  qIndex++;
  if (qIndex >= queue.length) showWin();
  else renderQuestion();
}

// ══════════════ WIN ══════════════
function showWin() {
  document.getElementById('prog').style.width = '100%';
  updateDots();
  const total = queue.length;
  const pct   = Math.round(score / total * 100);
  const msgs  = {
    supporting: '3 festival standını gezip tamamladın! 🌟',
    standard:   '4 standı başarıyla geçtin! Çok başarılısın! 🚀',
    expansion:  'Festivali baştan sona gezip tamamladın! Efsanesin! 👑',
  };
  document.getElementById('win-score').textContent = `${score} / ${total} (${pct}%)`;
  document.getElementById('win-msg').textContent   = msgs[currentDiff];
  document.getElementById('win-screen').classList.add('visible');
  document.getElementById('game-wrap').style.display = 'none';
}

function restart() { buildGame(); }

window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY>10);
});

setDiff('standard');
</script>
